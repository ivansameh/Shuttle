version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: shuttle_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shuttle
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: shuttle_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: shuttle_backend
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/shuttle?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - JWT_SECRET=shuttle_super_secret_jwt_key
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    container_name: shuttle_admin_web
    ports:
      - "5000:80"
    depends_on:
      - backend
    restart: unless-stopped

  rider-web:
    build:
      context: .
      dockerfile: apps/rider-web/Dockerfile
    container_name: shuttle_rider_web
    ports:
      - "5001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
